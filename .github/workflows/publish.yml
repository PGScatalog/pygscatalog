name: Publish packages

on:
  workflow_dispatch:
    inputs:
      package:
        type: choice
        options:
        - pgscatalog.core
        - pgscatalog.match
        - pgscatalog.calc
        - pgscatalog.utils
      version:
        type: string
        required: true

jobs:
  publish:
    name: build and publish package
    runs-on: ubuntu-latest
    environment: release

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - uses: wntrblm/nox@2024.04.15

      - name: Check requested version
        run: |
          uv run --package "$PACKAGE" python - <<'PY'
          import importlib
          import os
          import sys

          package = os.environ["PACKAGE"]
          expected = os.environ["EXPECTED_VERSION"]
          actual = importlib.import_module(package).__version__

          if actual != expected:
              print(
                  f"Version mismatch for {package}: workflow input version is "
                  f"{expected!r}, but {package}.__version__ is {actual!r}",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          print(f"Version check passed for {package}: {actual}")
          PY
        env:
          PACKAGE: ${{ inputs.package }}
          EXPECTED_VERSION: ${{ inputs.version }}
        working-directory: pgscatalog.utils
        
      - name: Test package before building
        run: nox -s tests -- ${{ inputs.package }}
        working-directory: pgscatalog.utils

      - name: Build package
        run: nox -s build -- ${{ inputs.package }}
        working-directory: pgscatalog.utils

      - name: Publish package distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pgscatalog.utils/dist/
          skip-existing: false

      - name: Read package version
        run: echo "TAG_NAME=$(uv version --package ${{ inputs.package }} | tr -s ' ' '-')" >> $GITHUB_ENV
        working-directory: pgscatalog.utils

      - name: Create tag
        uses: actions/github-script@v7
        with:
          script: |
              github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'refs/tags/${{ env.TAG_NAME }}',
                sha: context.sha
              })
